<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Staff Time Log — A2B Stores</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f5f7;--surface:#fff;--border:#e2e5ea;
  --text:#1a1f2e;--text2:#5a6278;--text3:#9099b0;
  --accent:#1a3a5c;--accent-lt:#eef4fb;
  --green:#0f6e56;--green-lt:#e1f5ee;
  --red:#b91c1c;
  --orange:#c2410c;--orange-lt:#fff0e6;
  --mono:'DM Mono',monospace;--sans:'DM Sans',system-ui,sans-serif;
  --r:10px;--rl:16px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
.card{background:var(--surface);border-radius:var(--rl);border:1px solid var(--border);width:100%;max-width:460px;overflow:hidden}
.hdr{background:var(--accent);padding:1.4rem 1.75rem;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo i{font-size:22px;color:#fff}
.htitle{font-size:16px;font-weight:600;color:#fff}
.hsub{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1px}
.livebadge{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,0.8);background:rgba(255,255,255,0.12);padding:4px 10px;border-radius:20px}
.ldot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.lbody{padding:2rem 1.75rem}
.lintro{text-align:center;margin-bottom:1.75rem}
.lintro h2{font-size:20px;font-weight:600}
.lintro p{font-size:13px;color:var(--text2);margin-top:4px}
.field{margin-bottom:1.1rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.6px}
.field input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r);font-size:15px;font-family:var(--sans);background:var(--surface);color:var(--text)}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,58,92,0.1)}
.btn{width:100%;padding:13px;border:none;border-radius:var(--r);font-size:15px;font-weight:600;font-family:var(--sans);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s,transform 0.1s}
.btn:hover{opacity:0.87}.btn:active{transform:scale(0.98)}.btn:disabled{opacity:0.42;cursor:not-allowed;transform:none}
.btn-ac{background:var(--accent);color:#fff}
.btn-gr{background:#0f6e56;color:#fff}
.btn-or{background:var(--orange);color:#fff}
.btn-sm{background:none;border:1px solid var(--border);color:var(--text2);font-size:13px;padding:7px 14px;width:auto;font-family:var(--sans);cursor:pointer;border-radius:var(--r);display:flex;align-items:center;gap:6px}
.btn-sm:hover{background:var(--bg)}
.errmsg{font-size:13px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
.mwrap{display:none}
.tbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.75rem;border-bottom:1px solid var(--border);background:#f9fafc}
.tbar-l{display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tname{font-size:14px;font-weight:600}
.tsub{font-size:12px;color:var(--text2);margin-top:1px}
.mbody{padding:1.5rem 1.75rem}
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3);margin-bottom:10px}
.div{height:1px;background:var(--border);margin:1.25rem 0}
.locbox{display:flex;align-items:center;gap:10px;padding:13px 14px;border:1px solid var(--border);border-radius:var(--r);background:#f9fafc}
.locbox i{font-size:22px;color:var(--accent);flex-shrink:0}
.ln{font-size:15px;font-weight:600}
.ls{font-size:12px;color:var(--text2);margin-top:2px}
.locbox.oth{border-color:#f9a87a;background:var(--orange-lt)}
.locbox.oth i{color:var(--orange)}
textarea.notes{width:100%;padding:10px 13px;margin-top:10px;border:1px solid var(--border);border-radius:var(--r);font-size:14px;font-family:var(--sans);background:var(--surface);color:var(--text);resize:vertical;min-height:80px}
textarea.notes:focus{outline:none;border-color:var(--accent)}
.datebox{display:flex;align-items:center;gap:10px;padding:12px 13px;border:1px solid var(--border);border-radius:var(--r);background:#f9fafc;font-size:15px}
.datebox i{color:var(--text3);font-size:18px}
.clkcard{border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;background:var(--surface);text-align:center}
.clklbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:var(--text2);margin-bottom:12px}
.clkd{font-size:52px;font-weight:500;color:var(--accent);letter-spacing:5px;font-family:var(--mono);margin-bottom:14px;line-height:1}
.clkctrl{display:grid;grid-template-columns:1fr 20px 1fr;gap:8px;align-items:center;max-width:180px;margin:0 auto}
.tp{display:flex;flex-direction:column;align-items:center;gap:6px}
.col{font-size:22px;color:var(--text3);font-weight:500;padding-bottom:4px}
.adj{width:46px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;user-select:none;-webkit-user-select:none}
.adj:hover{background:var(--accent-lt);color:var(--accent);border-color:rgba(26,58,92,0.3)}
.adj:active{transform:scale(0.88)}
.cicard{background:var(--orange-lt);border:1px solid #f9a87a;border-radius:var(--r);padding:16px;text-align:center;margin-bottom:1.25rem}
.cilbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--orange);margin-bottom:6px}
.citime{font-size:40px;font-weight:500;color:var(--orange);font-family:var(--mono);letter-spacing:4px;line-height:1}
.ciloc{font-size:12px;color:var(--orange);margin-top:6px;font-weight:500}
.entry-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;background:#f9fafc}
.entry-times{font-size:15px;font-weight:500;font-family:var(--mono);color:var(--accent)}
.entry-loc{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;flex-shrink:0;background:var(--green-lt);color:var(--green)}
.msg{margin-top:12px;font-size:13px;text-align:center;line-height:1.5;min-height:20px}
.msg.ok{color:var(--green)}.msg.err{color:var(--red)}
.loading{padding:3rem 1.75rem;text-align:center;color:var(--text2);font-size:14px}
.loading i{font-size:32px;color:var(--text3);margin-bottom:12px;display:block}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:420px){body{padding:0}.card{border-radius:0;border-left:none;border-right:none;max-width:100%;min-height:100vh}.clkd{font-size:42px}}
</style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo"><i class="ti ti-clock-hour-4"></i></div>
      <div><div class="htitle">Staff Time Log</div><div class="hsub">A2B Stores &amp; Warehouse</div></div>
    </div>
    <div class="livebadge"><span class="ldot"></span>Live</div>
  </div>

  <div id="loginSec">
    <div class="lbody">
      <div class="lintro"><h2>Sign in to log hours</h2><p>Enter your login ID and PIN</p></div>
      <div class="field"><label>Login ID</label><input id="lid" type="text" placeholder="e.g. Deva" autocomplete="username"/></div>
      <div class="field"><label>PIN</label><input id="lpin" type="password" placeholder="••••" maxlength="6" autocomplete="current-password"/></div>
      <button class="btn btn-ac" onclick="doLogin()"><i class="ti ti-login"></i> Sign in</button>
      <p class="errmsg" id="lerr"></p>
    </div>
  </div>

  <div class="mwrap" id="mainSec">
    <div class="tbar">
      <div class="tbar-l">
        <div class="av" id="avEl">DV</div>
        <div><div class="tname" id="gname"></div><div class="tsub" id="tday"></div></div>
      </div>
      <button class="btn-sm" onclick="doLogout()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
    <div id="mainBody"><div class="loading"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i>Loading…</div></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
var SCRIPT = 'https://script.google.com/macros/s/AKfycbxo9X8_OzvGGEC8-g7DMm9Q92VBwxMqAIx8nzvrXCP6O1Pi3fVAr6adzwbfCmJak8zT/exec';

var USERS = {
  deva: {pin:'1234', name:'Deva', initials:'DV'}
  // Add more: sam: {pin:'5678', name:'Sam', initials:'SM'}
};

var LOCS = [
  {name:'Harrisdale A2B',         lat:-32.1072544, lon:115.9380042, r:300},
  {name:'Yokine A2B',             lat:-31.9103603, lon:115.8488003, r:300},
  {name:'Canning Vale Warehouse', lat:-32.0615003, lon:115.9092223, r:300}
];
// ─────────────────────────────────────────────────────────────────────────────

var user=null, detLoc=null, todayRows=[], openEntry=null;
var cH=8, cM=0, busy=false;

var pad=function(n){return String(n).padStart(2,'0');};
var toM=function(h,m){return h*60+m;};
var s2m=function(s){var p=(s||'0:0').toString().trim().split(':');return parseInt(p[0]||0)*60+parseInt(p[1]||0);};
var todayISO=function(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
var todayNice=function(){return new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});};

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin(){
  var id=document.getElementById('lid').value.trim().toLowerCase();
  var pin=document.getElementById('lpin').value.trim();
  if(!USERS[id]||USERS[id].pin!==pin){
    document.getElementById('lerr').textContent='Invalid login ID or PIN.';
    document.getElementById('lpin').value='';return;
  }
  document.getElementById('lerr').textContent='';
  user={id:id,name:USERS[id].name,initials:USERS[id].initials};
  document.getElementById('loginSec').style.display='none';
  document.getElementById('mainSec').style.display='block';
  document.getElementById('avEl').textContent=user.initials;
  document.getElementById('gname').textContent='Hello, '+user.name;
  document.getElementById('tday').textContent=todayNice();
  detectGeoThenLoad();
}
document.getElementById('lid').onkeydown=function(e){if(e.key==='Enter')document.getElementById('lpin').focus();};
document.getElementById('lpin').onkeydown=function(e){if(e.key==='Enter')doLogin();};

function doLogout(){
  user=null;detLoc=null;todayRows=[];openEntry=null;busy=false;cH=8;cM=0;
  document.getElementById('loginSec').style.display='block';
  document.getElementById('mainSec').style.display='none';
  document.getElementById('lid').value='';document.getElementById('lpin').value='';
  document.getElementById('mainBody').innerHTML='<div class="loading"><i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i>Loading…</div>';
}

// ── GPS ───────────────────────────────────────────────────────────────────────
function detectGeoThenLoad(){
  if(!navigator.geolocation){detLoc='Others';loadSheet();return;}
  navigator.geolocation.getCurrentPosition(
    function(pos){
      var lat=pos.coords.latitude,lon=pos.coords.longitude,best=null,bestD=Infinity;
      LOCS.forEach(function(g){
        var dx=(lat-g.lat)*111000,dy=(lon-g.lon)*111000*Math.cos(lat*Math.PI/180);
        var d=Math.sqrt(dx*dx+dy*dy);
        if(d<g.r&&d<bestD){bestD=d;best=g;}
      });
      detLoc=best?best.name:'Others';loadSheet();
    },
    function(){detLoc='Others';loadSheet();},
    {timeout:7000,maximumAge:60000}
  );
}

// ── LOAD SHEET ────────────────────────────────────────────────────────────────
function loadSheet(){
  var url=SCRIPT+'?action=get&userId='+encodeURIComponent(user.id)+'&cb='+Date.now();
  fetch(url)
  .then(function(r){return r.json();})
  .then(function(data){
    todayRows=[];openEntry=null;
    if(data.ok&&Array.isArray(data.rows)){
      var today=todayISO();

      // Collect all of today's rows
      var allToday=[];
      data.rows.forEach(function(r){
        if(String(r[5]).trim()===today) allToday.push(r);
      });

      // Build set of start times that have a corresponding complete entry
      // This handles duplicate/stuck rows from earlier bugs
      var completedStartTimes={};
      allToday.forEach(function(r){
        var hasFinish=r[7]&&String(r[7]).trim()!=='';
        if(hasFinish) completedStartTimes[String(r[6]).trim()]=true;
      });

      // Only keep rows that are valid:
      // - Complete rows always kept
      // - Open rows only kept if their start time does NOT already have a completed version
      allToday.forEach(function(r){
        var hasStart =r[6]&&String(r[6]).trim()!=='';
        var hasFinish=r[7]&&String(r[7]).trim()!=='';
        if(!hasStart) return; // skip empty rows
        if(hasFinish){
          // Complete entry — always include
          todayRows.push(r);
        } else {
          // Open entry — only include if no completed entry exists with same start time
          var startKey=String(r[6]).trim();
          if(!completedStartTimes[startKey]){
            todayRows.push(r);
            if(!openEntry) openEntry=r;
          }
          // else: this is a stale/duplicate open row — skip it
        }
      });
    }
    var now=new Date(); cH=now.getHours(); cM=now.getMinutes();
    render();
  })
  .catch(function(err){
    var now=new Date(); cH=now.getHours(); cM=now.getMinutes();
    render();
  });
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  var html='<div class="mbody">';

  // Completed shifts today
  var completed=todayRows.filter(function(r){return r[7]&&String(r[7]).trim()!=='';});
  if(completed.length>0){
    html+='<div class="slbl">Today\'s shifts</div>';
    completed.forEach(function(r){
      html+='<div class="entry-row">'+
        '<div>'+
          '<div class="entry-times">'+String(r[6])+' &rarr; '+String(r[7])+'</div>'+
          '<div class="entry-loc"><i class="ti ti-map-pin" style="font-size:11px"></i> '+String(r[3])+'</div>'+
        '</div>'+
        '<span class="badge">Done</span>'+
      '</div>';
    });
    html+='<div class="div"></div>';
  }

  if(openEntry){
    // CLOCK-OUT view
    var st=String(openEntry[6]).trim();
    var loc=String(openEntry[3]).trim();
    var note=openEntry[4]?String(openEntry[4]).trim():'';
    html+=
      '<div class="cicard">'+
        '<div class="cilbl"><i class="ti ti-player-play" style="font-size:11px"></i> Clocked in at</div>'+
        '<div class="citime">'+st+'</div>'+
        '<div class="ciloc"><i class="ti ti-map-pin" style="font-size:11px"></i> '+loc+(note?' &mdash; '+note:'')+'</div>'+
      '</div>'+
      '<div class="slbl">Finish time</div>'+
      mkClock('Finish time')+
      '<div class="div" style="margin-top:1.25rem"></div>'+
      '<button class="btn btn-or" id="subBtn" onclick="submitFinish()"><i class="ti ti-player-stop"></i> Clock out</button>'+
      '<p class="msg" id="subMsg"></p>';
  } else {
    // CLOCK-IN view
    var locHtml=detLoc&&detLoc!=='Others'
      ?'<div class="locbox"><i class="ti ti-map-pin"></i><div><div class="ln">'+detLoc+'</div><div class="ls"><i class="ti ti-satellite" style="font-size:11px"></i> Detected via GPS</div></div></div>'
      :'<div class="locbox oth"><i class="ti ti-map-pin"></i><div><div class="ln">Other Location</div><div class="ls">Not near a registered site</div></div></div>'+
       '<textarea class="notes" id="otherNote" placeholder="Enter location — e.g. Diwali Mela stall at Perth City"></textarea>';
    html+=
      '<div class="slbl">Location</div>'+locHtml+
      '<div class="div"></div>'+
      '<div class="slbl">Date</div>'+
      '<div class="datebox"><i class="ti ti-calendar-event"></i><span>'+todayNice()+'</span></div>'+
      '<div class="div"></div>'+
      '<div class="slbl">Start time</div>'+
      mkClock('Start time')+
      '<div class="div"></div>'+
      '<button class="btn btn-gr" id="subBtn" onclick="submitStart()"><i class="ti ti-player-play"></i> Clock in</button>'+
      '<p class="msg" id="subMsg"></p>';
  }

  html+='</div>';
  document.getElementById('mainBody').innerHTML=html;
}

function mkClock(lbl){
  return '<div class="clkcard">'+
    '<div class="clklbl">'+lbl+'</div>'+
    '<div class="clkd" id="cdsp">'+pad(cH)+':'+pad(cM)+'</div>'+
    '<div class="clkctrl">'+
      '<div class="tp"><button class="adj" onclick="ac(\'h\',1)">&#8743;</button><button class="adj" onclick="ac(\'h\',-1)">&#8744;</button></div>'+
      '<div class="col">:</div>'+
      '<div class="tp"><button class="adj" onclick="ac(\'m\',1)">&#8743;</button><button class="adj" onclick="ac(\'m\',-1)">&#8744;</button></div>'+
    '</div></div>';
}

function ac(part,delta){
  if(part==='h') cH=(cH+delta+24)%24;
  else           cM=(cM+delta+60)%60;
  var el=document.getElementById('cdsp');
  if(el) el.textContent=pad(cH)+':'+pad(cM);
}

// ── OVERLAP CHECK ─────────────────────────────────────────────────────────────
function hasOverlap(ns, nf){
  for(var i=0;i<todayRows.length;i++){
    var r=todayRows[i];
    if(openEntry&&String(r[0])===String(openEntry[0])) continue;
    var rs=s2m(String(r[6]));
    var hasF=r[7]&&String(r[7]).trim()!=='';
    if(hasF){
      var rf=s2m(String(r[7]));
      if(nf===-1){ if(ns>=rs&&ns<rf) return true; }
      else { if(ns<rf&&nf>rs) return true; }
    } else {
      if(nf===-1) return true; // already an open entry
    }
  }
  return false;
}

// ── SUBMIT START — GET request, no CORS issue ────────────────────────────────
function submitStart(){
  if(busy) return;
  var noteEl=document.getElementById('otherNote');
  var note=noteEl?noteEl.value.trim():'';
  var loc=detLoc||'Others';
  if(loc==='Others'&&!note){showMsg('err','Please enter the location details.');return;}

  var timeStr=pad(cH)+':'+pad(cM);
  if(hasOverlap(s2m(timeStr),-1)){showMsg('err','You already have an active shift. Please clock out first.');return;}

  busy=true;setBtn(true);

  var entryId=String(Date.now());
  var params=[
    'action=append',
    'id='+encodeURIComponent(entryId),
    'uid='+encodeURIComponent(user.id),
    'name='+encodeURIComponent(user.name),
    'loc='+encodeURIComponent(loc),
    'note='+encodeURIComponent(note),
    'date='+encodeURIComponent(todayISO()),
    'start='+encodeURIComponent(timeStr),
    'ts='+encodeURIComponent(new Date().toISOString()),
    'cb='+Date.now()
  ].join('&');

  fetch(SCRIPT+'?'+params)
  .then(function(r){return r.json();})
  .then(function(data){
    busy=false;setBtn(false);
    if(data.ok){
      var row=[entryId,user.id,user.name,loc,loc==='Others'?note:'',todayISO(),timeStr,'','','In Progress',new Date().toISOString()];
      openEntry=row;
      todayRows.push(row);
      render();
    } else {
      showMsg('err','Error: '+(data.error||'unknown'));
    }
  })
  .catch(function(e){
    busy=false;setBtn(false);
    showMsg('err','Network error. Please try again.');
  });
}

// ── SUBMIT FINISH — GET request, no CORS issue ───────────────────────────────
function submitFinish(){
  if(busy||!openEntry) return;
  var st=s2m(String(openEntry[6]));
  var ft=toM(cH,cM);
  if(ft<=st){showMsg('err','Finish time must be after start ('+openEntry[6]+').');return;}

  var timeStr=pad(cH)+':'+pad(cM);
  // Check overlap with other completed entries
  for(var i=0;i<todayRows.length;i++){
    var r=todayRows[i];
    if(String(r[0])===String(openEntry[0])) continue;
    if(r[7]&&String(r[7]).trim()){
      var rs=s2m(String(r[6])),rf=s2m(String(r[7]));
      if(st<rf&&ft>rs){showMsg('err','Finish time overlaps an existing shift.');return;}
    }
  }

  busy=true;setBtn(true);
  var dur=((ft-st)/60).toFixed(2);

  var params=[
    'action=update',
    'id='+encodeURIComponent(openEntry[0]),
    'finish='+encodeURIComponent(timeStr),
    'dur='+encodeURIComponent(dur),
    'cb='+Date.now()
  ].join('&');

  fetch(SCRIPT+'?'+params)
  .then(function(r){return r.json();})
  .then(function(data){
    busy=false;setBtn(false);
    if(data.ok){
      openEntry[7]=timeStr;openEntry[8]=dur;openEntry[9]='Complete';
      openEntry=null;
      render();
    } else {
      showMsg('err','Error: '+(data.error||'unknown'));
    }
  })
  .catch(function(e){
    busy=false;setBtn(false);
    showMsg('err','Network error. Please try again.');
  });
}

function setBtn(loading){
  var b=document.getElementById('subBtn');
  if(!b) return;
  b.disabled=loading;
  if(loading) b.innerHTML='<span class="spinner"></span> Saving…';
}
function showMsg(type,text){
  var el=document.getElementById('subMsg');
  if(el){el.className='msg '+type;el.textContent=text;}
}
</script>
</body>
</html>
